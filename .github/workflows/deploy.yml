name: Deployment Prod

on: workflow_dispatch

permissions:
    contents: read
    packages: write

concurrency: prod

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: prod

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            -   name: Set up JDK 21
                uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
            -   name: Execute Gradle build with tests
                run: ./gradlew build
            -   name: Build Docker images with gradle
                run: ./gradlew imageBuild
            -   name: Login to Docker Registry
                uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
                with:
                    registry: 'ghcr.io'
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Tag And Push Docker Images
                run: ./deploy_images.sh
            -   name: triggering deploy
                uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    key: ${{ secrets.SSH_KEY }}
                    port: ${{ secrets.SSH_PORT }}
                    script: ignored
