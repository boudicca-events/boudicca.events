name: Deployment Prod

on: workflow_dispatch

permissions:
    contents: read
    packages: write

concurrency: prod

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: prod

        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   name: Set up JDK 21
                uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
            -   name: Execute Gradle build with tests
                run: ./gradlew build
            -   name: Build Docker images with gradle
                run: ./gradlew imageBuild
            -   name: Login to Docker Registry
                uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
                with:
                    registry: 'ghcr.io'
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Tag And Push Docker Images
                run: ./deploy_images.sh
            -   name: triggering deploy
                uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    key: ${{ secrets.SSH_KEY }}
                    port: ${{ secrets.SSH_PORT }}
                    script: ignored
