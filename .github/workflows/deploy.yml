name: Deployment Prod

on: workflow_dispatch

permissions:
    contents: read
    packages: write

concurrency: prod

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: prod

        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            -   name: Set up JDK 21
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@0f4528296b4bc09e8ae0fc7be30185a4ab435545 # v6.0.0
            -   name: Execute Gradle build with tests
                run: ./gradlew build
            -   name: Build Docker images with gradle
                run: ./gradlew imageBuild
            -   name: Login to Docker Registry
                uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
                with:
                    registry: 'ghcr.io'
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Tag And Push Docker Images
                run: ./deploy_images.sh
            -   name: triggering deploy
                uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    key: ${{ secrets.SSH_KEY }}
                    port: ${{ secrets.SSH_PORT }}
                    script: ignored
