name: Publish Docker images

on: workflow_dispatch

permissions:
    contents: read

concurrency: publish

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: publish

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            -   name: Set up JDK 21
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
            -   name: Execute Gradle build with tests
                run: ./gradlew build
            -   name: Build Docker images with gradle
                run: ./gradlew imageBuild
            -   name: Login to Docker Registry
                uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
                with:
                    registry: 'docker.io'
                    username: ${{ secrets.DOCKERREGISTRY_USERNAME }}
                    password: ${{ secrets.DOCKERREGISTRY_TOKEN }}
            -   name: Tag And Push Docker Images
                run: ./publish_images.sh
