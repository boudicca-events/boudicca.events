name: Java CI with Gradle

on:
    push:
        branches: [ "main", "release/*" ]
    pull_request:
        branches: [ "main", "release/*" ]
    schedule:
        -   cron: "0 8 * * 2"

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    build-gradle-project:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
                with:
                    fetch-depth: 0
            -   name: Set up JDK 21
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Cache SonarQube packages
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar
            -   name: Cache Playwright browsers
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: ~/.cache/ms-playwright
                    key: ${{ runner.os }}-playwright-${{ hashFiles('**/gradle/libs.versions.toml') }}
                    restore-keys: ${{ runner.os }}-playwright
            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
            -   name: Execute Gradle build
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: ./gradlew build testCodeCoverageReport sonar --info
            -   name: Publish Test Report
                uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
                if: success() || failure() # always run even if the previous step fails
                with:
                    report_paths: '**/build/test-results/test/TEST-*.xml'
